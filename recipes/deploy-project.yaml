# =============================================================================
# CHANGELOG
# =============================================================================
#
# v1.0.1 (2026-06-26):
#   - BUGFIX: Template variables never substituted at runtime (resolved empty),
#     including cross-stage `output` values like {{project_profile}} and
#     {{stack_selection}}, plus {{project_dir}} and all loop while_condition/
#     break_when/update_context expressions.
#     * ROOT CAUSE: The recipe used spaced delimiters `{{var}}`. The recipe
#       engine's substitution regex (executor.py:2920
#       `r"\{\{(\w+(?:\.\w+)*)\}\}"` and the whole-var fullmatch at
#       executor.py:2879) requires the variable name to immediately follow `{{`
#       with NO interior whitespace (`\w` excludes spaces). `{{var}}` does not
#       match, so re.sub leaves the literal placeholder untouched and the agent
#       receives an unsubstituted/empty reference. This affected EVERY templated
#       reference in the file, not just the cross-stage ones.
#     * FIX: Removed interior whitespace from all 30 template references:
#       `{{var}}` -> `{{var}}`. No mechanism change needed — step `output`
#       already threads into the shared context dict across stages
#       (executor.py:1159-1160 `context[step.output] = result`), and staged
#       approval prompts are rendered with the same substitute_variables call
#       (executor.py:1249-1251).
#     * RESULT: Cross-stage values and all other variables now substitute
#       correctly in both step prompts and approval-gate prompts.
#
# v1.0.0 (2026-06-26):
#   - CRITICAL FIX: Rewrote recipe to conform to the staged recipe schema.
#     * ROOT CAUSE: The original draft used an invalid structure that produced
#       12 validation errors across 5 categories:
#         1. Missing top-level `version` field.
#         2. Stages defined `agent:`/`instruction:` directly instead of wrapping
#            work in a `steps:` list of step objects.
#         3. Field `instruction:` used instead of the schema field `prompt:`.
#         4. Approval gates used `approval_required:`/`approval_message:` instead
#            of the stage-level `approval:` block (required/prompt).
#         5. `update_context` referenced non-existent Jinja filters
#            (extract_recommended_stack, check_environment_ready,
#            check_repo_readiness, extract_deployment_url, check_deployment_health).
#     * FIX:
#         - Added `version: "1.0.0"`.
#         - Each stage now has a `steps:` list with `id`, `type: agent`, `agent`,
#           `prompt`, and `output`.
#         - Renamed every `instruction:` to `prompt:`.
#         - Converted approval gates to stage-level `approval:` blocks.
#         - Removed all custom filters. Values are threaded via step `output`
#           variables; the deployment-guide agent extracts specifics from prior
#           output text per its prompt instructions.
#         - The two looping stages (environment-setup, prepare) now use valid
#           step-level `while_condition` + `break_when` + `update_context`, with
#           a simple boolean flag fed by a trailing JSON status the agent emits
#           (parse_json: true) and a `max_while_iterations` safety limit.
#         - Replaced unsupported Jinja `{% if %}` control flow inside prompts with
#           plain-language conditional instructions for the agent.
#     * RESULT: Recipe validates cleanly while preserving all original prompt
#       content and the 10-stage guided deployment flow with approval gates.
#
# =============================================================================

name: deploy-project
description: >
  Guided end-to-end deployment of a project to Amplifier Online. Analyzes your project,
  recommends the right stack, verifies prerequisites, guides manifest creation, container
  builds, deployment, and optional CI/CD setup. Multi-stage with approval gates at critical
  decision points.
version: "1.0.0"
author: "Amplifier Online"
tags: ["amplifier-online", "deployment", "azure", "staged", "approval-gates"]

# Requirements:
#   - amplifier-online bundle (provides the deployment-guide agent)
#
# Usage:
#   amplifier tool invoke recipes operation=execute \
#     recipe_path=@amplifier-online:recipes/deploy-project.yaml \
#     context='{"project_dir": "."}'

context:
  project_dir: "."          # Path to the project directory to deploy
  environment_ready: "false" # Loop flag for the environment-setup stage
  repo_ready: "false"        # Loop flag for the prepare stage

stages:
  # ---------------------------------------------------------------------------
  # Stage 1: Analyze project structure and recommend a deployment stack
  # ---------------------------------------------------------------------------
  - name: "analyze"
    steps:
      - id: "analyze-project"
        type: "agent"
        agent: "amplifier-online:deployment-guide"
        prompt: |
          STAGE: Project Analysis

          You are in the **analyze** stage of the guided deployment recipe. Your task:

          1. Scan the project directory at {{project_dir}} using glob and grep
          2. Follow the detection patterns in @amplifier-online:context/agent/project-analysis.md
          3. Detect: backend framework, frontend framework, containerization status
          4. Map detected patterns to stack recommendations (web-app-aca, internal-service-aca, web-app-awa, static-web-app)
          5. Present findings in this format:

          ```
          PROJECT PROFILE

          Backend: [FastAPI/Django/Flask/Express/None]
            - Dockerfile: [present path | missing]
            - Framework evidence: [files found]

          Frontend: [React/Vue/Next.js/Static HTML/None]
            - Dockerfile: [present path | missing] (for container-based)
            - GitHub repo: [detected from git remote | not in GitHub]
            - Framework evidence: [files found]

          Resources Detected:
            - Database needs: [PostgreSQL/MongoDB/None - based on requirements/package.json]
            - Cache needs: [Redis detected | None]
            - Storage needs: [File uploads/object storage | None]
            - Cognitive Services needs: [Speech/Vision/Language/Document Intelligence | None]

          STACK RECOMMENDATION: [stack-name]

          Reasoning:
          - [Why this stack matches the detected architecture]
          - [Criteria from stacks-reference.md that align]

          Alternative Options:
          - [Other stacks that could work, with trade-offs]
          ```

          Make the "STACK RECOMMENDATION:" line explicit and unambiguous so the next
          stage can read the recommended stack directly from your output.
        output: "project_profile"
        timeout: 600

  # ---------------------------------------------------------------------------
  # Stage 2: User confirms stack selection or chooses an alternative
  # ---------------------------------------------------------------------------
  - name: "select-stack"
    approval:
      required: true
      prompt: |
        Stack analysis complete. Review the project profile and recommendation:

        {{project_profile}}

        Approve to lock in the selected stack and continue to environment setup.
        Deny to stop and reconsider the stack choice.
    steps:
      - id: "select-stack"
        type: "agent"
        agent: "amplifier-online:deployment-guide"
        prompt: |
          STAGE: Stack Selection

          Present the recommendation from the analyze stage:

          {{project_profile}}

          Ask the user:
          "The recommended stack is the one shown on the STACK RECOMMENDATION line above,
          based on your project structure.

          Options:
          1. Proceed with the recommended stack
          2. Choose a different stack (I'll explain all of them)
          3. Cancel (not ready to deploy yet)

          What would you like to do?"

          If the user wants to see all stacks, load @amplifier-online:context/agent/stacks-reference.md
          and present the comparison table.

          At the end of your response, clearly state the FINAL selected stack on its own
          line in the form:
          SELECTED STACK: <stack-name>
          (one of: web-app-aca, internal-service-aca, web-app-awa, static-web-app)
        output: "stack_selection"
        timeout: 600

  # ---------------------------------------------------------------------------
  # Stage 3: Verify CLI, config, and Azure authentication (looping)
  # ---------------------------------------------------------------------------
  - name: "environment-setup"
    steps:
      - id: "check-environment"
        type: "agent"
        agent: "amplifier-online:deployment-guide"
        prompt: |
          STAGE: Environment Setup

          The user selected a stack in the previous stage. Refer to it here:
          {{stack_selection}}

          Run these checks in sequence. For each failure, provide remediation guidance.

          CHECK 1: Amplifier Online CLI installed
            Run: which amplifier-online
            If not found -> "Install with: uv tool install amplifier-online"

          CHECK 2: Global config exists
            Check: ~/.amplifier-online/config.yaml
            If missing -> "Run: amplifier-online config" and guide through prompts
            If exists -> Read and verify acr_name, resource_group, environment

          CHECK 3: Azure authentication
            The CLI supports multiple credential types (InteractiveBrowserCredential, AzureCliCredential, etc.)
            Try: amplifier-online stack list (this will test auth)
            If auth fails -> Guide: "The CLI will prompt for browser login if needed. Run: amplifier-online stack list"
            If succeeds -> "Azure authentication working"

          Work with the user to resolve any failing check before reporting success.

          Present the final checklist:
          ```
          ENVIRONMENT READY
          [pass] Amplifier Online CLI installed
          [pass] Config: ~/.amplifier-online/config.yaml
          [pass] Azure authentication working
          ```

          FINALLY, output a single JSON object on its own line as the LAST line of your
          response indicating whether every check passed:
          {"all_checks_passed": true}   (if all three checks pass)
          {"all_checks_passed": false}  (if any check still fails)
        output: "environment_status"
        parse_json: true
        while_condition: "{{environment_ready}} != 'true'"
        break_when: "{{environment_ready}} == 'true'"
        max_while_iterations: 10
        update_context:
          environment_ready: "{{environment_status.all_checks_passed}}"
        timeout: 900

  # ---------------------------------------------------------------------------
  # Stage 4: Generate or validate the project manifest
  # ---------------------------------------------------------------------------
  - name: "initialize"
    approval:
      required: true
      prompt: |
        Manifest review complete:

        {{manifest_status}}

        Approve if the manifest looks correct to proceed to repository preparation.
        Deny to adjust manifest fields first.
    steps:
      - id: "initialize-manifest"
        type: "agent"
        agent: "amplifier-online:deployment-guide"
        prompt: |
          STAGE: Manifest Initialization

          Selected stack (from the stack-selection stage):
          {{stack_selection}}

          Project directory: {{project_dir}}

          STEP 1: Check if amplifier-online.yaml exists
            Run: glob("amplifier-online.yaml")

          IF MANIFEST EXISTS:
            - Read the manifest with read_file
            - Validate against @amplifier-online:context/agent/manifest-schema.md
            - Check for outdated schema (e.g., uses `containers:` instead of `services:`, uses top-level `backend:` instead of `services: api:` for web-app-awa, or `frontend:` section missing `protected`/`auth` fields).
            - Propose fixes for any schema drift
            - Ask user: "I found an existing manifest. [Show summary]. Want to update it or keep as-is?"

          IF NO MANIFEST:
            - Run: amplifier-online init --stack <selected-stack>
            - Read the generated manifest
            - Explain each field to the user
            - Highlight fields they MUST customize (name, image references, ports)

          Present the manifest with field-by-field explanation:
          ```yaml
          name: my-project              # <- Change this to your project name
          stack: <selected-stack>

          services:
            api:
              image: amplifieronlinecr.azurecr.io/my-project-api:latest  # <- Update project name
              port: 8000                # <- Must match your app's listen port
              protected: validate       # <- validate | login | false; or object form {mode, exclude}

          [... rest of manifest with annotations ...]
          ```

          Ask: "Does this manifest look correct? Any fields to adjust?"

          Summarize the validated manifest at the end of your response so the approval
          gate can show it to the user.
        output: "manifest_status"
        timeout: 600

  # ---------------------------------------------------------------------------
  # Stage 5: Repo readiness checklist (looping)
  # ---------------------------------------------------------------------------
  - name: "prepare"
    steps:
      - id: "prepare-repo"
        type: "agent"
        agent: "amplifier-online:deployment-guide"
        prompt: |
          STAGE: Repository Preparation

          Selected stack (from the stack-selection stage):
          {{stack_selection}}

          Run the repo readiness check from your operating principles.

          FOR web-app-aca and internal-service-aca:
            1. Verify Dockerfiles exist for each container (glob "**/Dockerfile*")
            2. Verify ACR image format in manifest (grep for docker.io or wrong registry)
            3. Verify health endpoints exist (/health returning 200 OK)
            4. Check ports in manifest match application listen ports

          FOR web-app-awa:
            Backend: Same Docker checks as web-app-aca/internal-service-aca
            Frontend:
              - Verify GitHub repo URL in manifest is accessible
              - Check build output directory (output_location) matches framework default
              - Verify build command is correct (npm run build, etc.)

          FOR static-web-app:
            - Verify GitHub repo URL
            - Check build config (output_location, build_command)
            - No backend checks needed

          Present checklist:
          ```
          REPO READINESS for <selected-stack>

          [pass] [checks that passed]
          [fail] [checks that failed]

          FOR EACH [fail]:
          - What's wrong
          - How to fix it
          - Exact commands or code changes needed
          ```

          If any check fails, guide remediation with the user before reporting success.

          FINALLY, output a single JSON object on its own line as the LAST line of your
          response indicating whether the repo is ready:
          {"repo_ready": true}   (if all checks pass)
          {"repo_ready": false}  (if any check still fails)
        output: "repo_status"
        parse_json: true
        while_condition: "{{repo_ready}} != 'true'"
        break_when: "{{repo_ready}} == 'true'"
        max_while_iterations: 10
        update_context:
          repo_ready: "{{repo_status.repo_ready}}"
        timeout: 900

  # ---------------------------------------------------------------------------
  # Stage 6: Build and push container images to ACR
  # ---------------------------------------------------------------------------
  - name: "build-push"
    approval:
      required: true
      prompt: |
        Build and push step summary:

        {{build_status}}

        Approve once container images are pushed to ACR (or if the stack is
        static-web-app, which has no images to push) to proceed to deployment.
        Deny if the images are not yet built and pushed.
    steps:
      - id: "build-and-push"
        type: "agent"
        agent: "amplifier-online:deployment-guide"
        prompt: |
          STAGE: Build and Push (Container stacks only)

          Selected stack (from the stack-selection stage):
          {{stack_selection}}

          If the selected stack is static-web-app:
            SKIP this stage. The static-web-app stack doesn't use container images;
            GitHub Actions handles builds. Tell the user this stage is skipped and that
            they can approve the gate to continue.

          Otherwise (container stacks: web-app-aca, internal-service-aca, web-app-awa):

          Read the manifest to extract image names and Dockerfile paths.

          For each service defined in the `services:` map:
            1. Generate the build command:
               docker build -t [image-from-manifest] [dockerfile-dir]

            2. Generate ACR login and push:
               az acr login --name [acr-name-from-config]
               docker push [image-from-manifest]

          Present the full sequence:
          ```bash
          # Backend
          docker build -t amplifieronlinecr.azurecr.io/my-project-api:latest ./api
          az acr login --name amplifieronlinecr
          docker push amplifieronlinecr.azurecr.io/my-project-api:latest

          # Frontend (if container type)
          docker build -t amplifieronlinecr.azurecr.io/my-project-web:latest ./web
          docker push amplifieronlinecr.azurecr.io/my-project-web:latest
          ```

          Ask user: "Run these commands in your terminal, then confirm when both images are pushed."

          Summarize the build/push status at the end of your response.
        output: "build_status"
        timeout: 600

  # ---------------------------------------------------------------------------
  # Stage 7: Deploy to Amplifier Online with a dry-run preview
  # ---------------------------------------------------------------------------
  - name: "deploy"
    approval:
      required: true
      prompt: |
        Deployment step summary:

        {{deployment_result}}

        Approve to confirm the deployment is complete and proceed to verification.
        Deny if the deployment did not complete successfully.
    steps:
      - id: "deploy-project"
        type: "agent"
        agent: "amplifier-online:deployment-guide"
        prompt: |
          STAGE: Deployment

          Selected stack (from the stack-selection stage):
          {{stack_selection}}

          STEP 1: Dry-run preview
            Run: amplifier-online up --dry-run

            Present the output to the user:
            ```
            DRY-RUN PREVIEW

            [paste dry-run output showing resources to be created]
            ```

          STEP 2: Ask for approval
            "This will create the above resources in Azure. Proceed with actual deployment?"

          STEP 3: If the user approves, run deployment
            Run: amplifier-online up

            Show real-time output as deployment progresses.

          STEP 4: Extract deployment info
            - Project URL (from deployment output)
            - Container App names (if web-app-aca or internal-service-aca)
            - Static Web App name (if static-web-app or web-app-awa frontend)

          At the end of your response, clearly state the live deployment URL on its own
          line in the form:
          DEPLOYMENT URL: <url>
        output: "deployment_result"
        timeout: 900

  # ---------------------------------------------------------------------------
  # Stage 8: Health check and troubleshooting
  # ---------------------------------------------------------------------------
  - name: "verify"
    steps:
      - id: "verify-deployment"
        type: "agent"
        agent: "amplifier-online:deployment-guide"
        prompt: |
          STAGE: Verification

          Selected stack (from the stack-selection stage):
          {{stack_selection}}

          Deployment details (extract the deployment URL from here):
          {{deployment_result}}

          STEP 1: Check deployment status
            Run: amplifier-online status

            Parse output:
            - Are all containers/apps in "Running" state?
            - Any error messages?

          STEP 2: Health check
            If the selected stack is a container stack (web-app-aca, internal-service-aca, web-app-awa):
              Run: curl <deployment-url>/health

              If 200 OK -> "Health check passed"
              If failed -> Engage troubleshooting mode:
                1. amplifier-online logs --container [service-name]
                2. Map error to failure mode in troubleshooting-playbook.md
                3. Guide remediation
            If the selected stack is static-web-app:
              Run: curl <deployment-url>

              If it loads -> "Static site is live"
              If failed -> Check Static Web App deployment logs in Azure Portal

          STEP 3: Present results
            ```
            DEPLOYMENT VERIFICATION

            [pass] Status: All containers/apps running
            [pass] Health: <deployment-url>/health -> 200 OK
            [pass] Your app is live at: <deployment-url>

            Next: Set up CI/CD for automatic deployments? (next stage)
            ```

          Summarize whether the deployment is healthy at the end of your response.
        output: "verification_status"
        timeout: 600

  # ---------------------------------------------------------------------------
  # Stage 9: Optional GitHub Actions CI/CD setup
  # ---------------------------------------------------------------------------
  - name: "cicd-setup"
    approval:
      required: true
      prompt: |
        Verification summary:

        {{verification_status}}

        Approve to set up GitHub Actions CI/CD now, or deny to skip CI/CD setup.
    steps:
      - id: "cicd-setup"
        type: "agent"
        agent: "amplifier-online:deployment-guide"
        prompt: |
          STAGE: CI/CD Setup (Optional)

          Selected stack (from the stack-selection stage):
          {{stack_selection}}

          Ask user: "Want to set up GitHub Actions for automatic deployments on push? (yes/skip)"

          IF YES:
            STEP 1: Generate workflows
              Run: amplifier-online cicd create --dry-run

              Show preview:
              ```
              WORKFLOWS TO BE CREATED

              [list generated workflow files]
              ```

            STEP 2: Create workflows if user approves
              Run: amplifier-online cicd create

            STEP 3: Confirm GitHub secrets/variables
              Load @amplifier-online:context/agent/cicd-guide.md

              `amplifier-online cicd create` already sets the repo secrets and variables via `gh`
              (or prints `gh secret/variable set` commands if gh is unavailable). Confirm them:

              If the selected stack is web-app-aca, internal-service-aca, or web-app-awa:
                Container workflows need NO Azure secrets — deploys authenticate to the provisioner
                via a GitHub OIDC token. Verify these repo variables are set (gh variable list):
                  - AO_PROVISIONER_URL
                  - AO_PROVISIONER_AUDIENCE
                  - AO_PROJECT_NAME

              If the selected stack is web-app-awa or static-web-app:
                For Static Web App, verify the secret:
                  - AZURE_STATIC_WEB_APPS_API_TOKEN

                Set automatically after the first `amplifier-online up`; if it was missing when you
                first ran `cicd create`, re-run `amplifier-online cicd create`.

            STEP 4: Commit workflows
              ```bash
              git add .github/workflows/
              git commit -m "Add CI/CD workflows for the selected stack"
              git push
              ```

          IF SKIP:
            "No problem. You can set up CI/CD later with: amplifier-online cicd create"

          FINAL SUMMARY:
            ```
            DEPLOYMENT COMPLETE

            Project: [name]
            Stack: [selected stack]
            URL: [deployment url]
            CI/CD: [Configured | Skipped]

            Next steps:
            - Visit the deployment URL to see your app
            - Monitor with: amplifier-online status
            - View logs with: amplifier-online logs
            - If CI/CD was configured, push to main branch to trigger automatic deployments
            ```

          Report whether CI/CD was configured or skipped at the end of your response.
        output: "cicd_status"
        timeout: 600

  # ---------------------------------------------------------------------------
  # Stage 10: Write project-specific deployment context into the repo's AGENTS.md
  # ---------------------------------------------------------------------------
  - name: "write-deployment-context"
    approval:
      required: true
      prompt: |
        Final step: write project-specific deployment context into the repo's AGENTS.md
        so a future AI session can operate this deployed project.

        Approve to write and commit the deployment context, or deny to skip.
    steps:
      - id: "write-deployment-context"
        type: "agent"
        agent: "amplifier-online:deployment-guide"
        prompt: |
          STAGE: Write Deployment Context

          You have just completed a full deployment of this project. The key details are:
          - Project directory: {{project_dir}}
          - Selected stack (from the stack-selection stage): {{stack_selection}}
          - Deployment details (extract the deployment URL from here): {{deployment_result}}
          - Verification results: {{verification_status}}
          - CI/CD status: {{cicd_status}}

          Your task is to write project-specific deployment context into the repo's AGENTS.md
          so that a future AI session can immediately understand how to operate this deployed
          project without re-discovering everything from scratch.

          STEP 1: Find or create the AGENTS.md file
            Check for an existing AGENTS.md at the project root ({{project_dir}}/AGENTS.md).
            If not found, check {{project_dir}}/.amplifier/AGENTS.md.
            If neither exists, create {{project_dir}}/AGENTS.md (at the project root, next to
            CLAUDE.md — not in .amplifier/).

          STEP 2: Read the existing file content (if any)
            If the file already contains an "Amplifier Online" section (or similar deployment
            section), update it in place with current information. Do not duplicate.

          STEP 3: Write the deployment context
            Ensure the file contains the following project-specific operational information
            that answers "how do I work with this deployed project?":

            - Stack type (the selected stack) and what that means for this repo's architecture
            - Live deployment URL (extracted from the deployment details above)
            - Key CLI commands specific to this project: how to deploy, check status, view logs,
              and tear down (e.g., `amplifier-online up`, `amplifier-online status`,
              `amplifier-online logs`, `amplifier-online destroy`)
            - CI/CD status: whether GitHub Actions workflows were set up in the previous stage
            - Image naming convention used in this project's ACR (extracted from the manifest)

            Keep the content concise and operational. A future AI session reading this file
            should be able to deploy an update, check health, or debug a failure without
            consulting external documentation.

            Do NOT include: full CLI reference documentation, stack selection guidance,
            general troubleshooting playbooks, or explanations of what Amplifier Online is.
            Those belong in the bundle's context docs, not in the repo.

          STEP 4: Commit the change
            Stage the file and commit with an appropriate message, e.g.:
            ```bash
            git add AGENTS.md
            git commit -m "docs: add Amplifier Online deployment context to AGENTS.md"
            ```
        output: "context_write_status"
        timeout: 600
