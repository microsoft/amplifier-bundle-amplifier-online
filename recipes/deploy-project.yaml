name: deploy-project
description: |
  Guided end-to-end deployment of a project to Amplifier Online. Analyzes your project,
  recommends the right stack, verifies prerequisites, guides manifest creation, container
  builds, deployment, and optional CI/CD setup. Multi-stage with approval gates at critical
  decision points.

context:
  project_dir:
    type: string
    description: Path to the project directory to deploy
    default: "."

stages:
  - name: analyze
    description: Analyze project structure and recommend deployment stack
    agent: amplifier-online:deployment-guide
    instruction: |
      STAGE: Project Analysis
      
      You are in the **analyze** stage of the guided deployment recipe. Your task:
      
      1. Scan the project directory at {{ project_dir }} using glob and grep
      2. Follow the detection patterns in @amplifier-online:context/agent/project-analysis.md
      3. Detect: backend framework, frontend framework, containerization status
      4. Map detected patterns to stack recommendations (web-app-aca, web-app-awa, static-web-app)
      5. Present findings in this format:
      
      ```
      PROJECT PROFILE
      
      Backend: [FastAPI/Django/Flask/Express/None]
        - Dockerfile: [✅ path | ❌ missing]
        - Framework evidence: [files found]
      
      Frontend: [React/Vue/Next.js/Static HTML/None]
        - Dockerfile: [✅ path | ❌ missing] (for container-based)
        - GitHub repo: [detected from git remote | ❌ not in GitHub]
        - Framework evidence: [files found]
      
      Resources Detected:
        - Database needs: [PostgreSQL/MongoDB/None - based on requirements/package.json]
        - Cache needs: [Redis detected | None]
        - Storage needs: [File uploads/object storage | None]
      
      STACK RECOMMENDATION: [stack-name]
      
      Reasoning:
      - [Why this stack matches the detected architecture]
      - [Criteria from stacks-reference.md that align]
      
      Alternative Options:
      - [Other stacks that could work, with trade-offs]
      ```
      
      Store the recommended stack in context as `recommended_stack` for the next stage.
    
    update_context:
      recommended_stack: "{{ _last_response | extract_recommended_stack }}"
      project_profile: "{{ _last_response }}"

  - name: select-stack
    description: User confirms stack selection or chooses alternative
    agent: amplifier-online:deployment-guide
    instruction: |
      STAGE: Stack Selection (Approval Gate)
      
      Present the recommendation from the analyze stage:
      
      {{ project_profile }}
      
      Ask the user:
      "The recommended stack is **{{ recommended_stack }}** based on your project structure.
      
      Options:
      1. Proceed with {{ recommended_stack }}
      2. Choose a different stack (I'll explain all three)
      3. Cancel (not ready to deploy yet)
      
      What would you like to do?"
      
      If user wants to see all stacks, load @amplifier-online:context/agent/stacks-reference.md
      and present the comparison table.
      
      Store the final selected stack as `selected_stack`.
    
    update_context:
      selected_stack: "{{ _approval_message | default(recommended_stack) }}"
    
    approval_required: true
    approval_message: "Confirm stack selection: {{ recommended_stack }}"

  - name: environment-setup
    description: Verify CLI, config, and Azure authentication
    agent: amplifier-online:deployment-guide
    instruction: |
      STAGE: Environment Setup
      
      The user has selected: **{{ selected_stack }}**
      
      Run these checks in sequence. For each ❌, provide remediation guidance.
      
      CHECK 1: Amplifier Online CLI installed
        Run: which amplifier-online
        ❌ If not found → "Install with: uv tool install amplifier-online"
      
      CHECK 2: Global config exists
        Check: ~/.amplifier-online/config.yaml
        ❌ If missing → "Run: amplifier-online config" and guide through prompts
        ✅ If exists → Read and verify acr_name, resource_group, environment
      
      CHECK 3: Azure authentication
        The CLI supports multiple credential types (InteractiveBrowserCredential, AzureCliCredential, etc.)
        Try: amplifier-online stack list (this will test auth)
        ❌ If auth fails → Guide: "The CLI will prompt for browser login if needed. Run: amplifier-online stack list"
        ✅ If succeeds → "Azure authentication working"
      
      Loop this stage until all checks pass. Use while_condition to retry.
      
      Present final checklist:
      ```
      ENVIRONMENT READY
      ✅ Amplifier Online CLI installed
      ✅ Config: ~/.amplifier-online/config.yaml
      ✅ Azure authentication working
      ```
    
    while_condition: "{{ environment_checks_failed | default(true) }}"
    break_when: "{{ all_checks_passed }}"
    update_context:
      all_checks_passed: "{{ _last_response | check_environment_ready }}"
      environment_checks_failed: "{{ not all_checks_passed }}"

  - name: initialize
    description: Generate or validate project manifest
    agent: amplifier-online:deployment-guide
    instruction: |
      STAGE: Manifest Initialization (Approval Gate)
      
      Selected stack: **{{ selected_stack }}**
      Project directory: {{ project_dir }}
      
      STEP 1: Check if amplifier-online.yaml exists
        Run: glob("amplifier-online.yaml")
      
      IF MANIFEST EXISTS:
        - Read the manifest with read_file
        - Validate against @amplifier-online:context/agent/manifest-schema.md
        - Check for outdated schema (e.g., uses `containers:` instead of `services:` for web-app-aca). Note: `backend:`/`frontend:` is the current schema for web-app-awa.
        - Propose fixes for any schema drift
        - Ask user: "I found an existing manifest. [Show summary]. Want to update it or keep as-is?"
      
      IF NO MANIFEST:
        - Run: amplifier-online init --stack {{ selected_stack }}
        - Read the generated manifest
        - Explain each field to the user
        - Highlight fields they MUST customize (name, image references, ports)
      
      Present the manifest with field-by-field explanation:
      ```yaml
      name: my-project              # ← Change this to your project name
      stack: {{ selected_stack }}
      
      services:
        api:
          image: amplifieronlinecr.azurecr.io/my-project-api:latest  # ← Update project name
          port: 8000                # ← Must match your app's listen port
          protected: validate       # ← validate | login | false; or object form {mode, exclude}
      
      [... rest of manifest with annotations ...]
      ```
      
      Ask: "Does this manifest look correct? Any fields to adjust?"
      
      Store: manifest_validated: true when user approves
    
    update_context:
      manifest_validated: "{{ _approval_message == 'yes' or _approval_message == 'approved' or _approval_message == 'looks good' }}"
    
    approval_required: true
    approval_message: "Review the manifest. Approve to proceed?"

  - name: prepare
    description: Repo readiness checklist
    agent: amplifier-online:deployment-guide
    instruction: |
      STAGE: Repository Preparation
      
      Stack: **{{ selected_stack }}**
      
      Run the repo readiness check from your operating principles.
      
      FOR web-app-aca:
        1. Verify Dockerfiles exist for each container (glob "**/Dockerfile*")
        2. Verify ACR image format in manifest (grep for docker.io or wrong registry)
        3. Verify health endpoints exist (/health returning 200 OK)
        4. Check ports in manifest match application listen ports
      
      FOR web-app-awa:
        Backend: Same Docker checks as web-app-aca
        Frontend: 
          - Verify GitHub repo URL in manifest is accessible
          - Check build output directory (output_location) matches framework default
          - Verify build command is correct (npm run build, etc.)
      
      FOR static-web-app:
        - Verify GitHub repo URL
        - Check build config (output_location, build_command)
        - No backend checks needed
      
      Present checklist:
      ```
      REPO READINESS for {{ selected_stack }}
      
      ✅ [checks that passed]
      ❌ [checks that failed]
      
      FOR EACH ❌:
      - What's wrong
      - How to fix it
      - Exact commands or code changes needed
      ```
      
      If any ❌ exist, guide remediation and loop this stage until all pass.
      
      Store: repo_ready: true when all checks pass
    
    while_condition: "{{ not repo_ready }}"
    break_when: "{{ repo_ready }}"
    update_context:
      repo_ready: "{{ _last_response | check_repo_readiness }}"

  - name: build-push
    description: Build and push container images to ACR
    agent: amplifier-online:deployment-guide
    instruction: |
      STAGE: Build and Push (Container stacks only)
      
      Stack: **{{ selected_stack }}**
      
      {% if selected_stack == 'static-web-app' %}
      SKIP: static-web-app stack doesn't use container images. GitHub Actions handles builds.
      {% else %}
      
      Read the manifest to extract image names and Dockerfile paths.
      
      For each service defined in the `services:` map:
        1. Generate the build command:
           docker build -t [image-from-manifest] [dockerfile-dir]
        
        2. Generate ACR login and push:
           az acr login --name [acr-name-from-config]
           docker push [image-from-manifest]
      
      Present the full sequence:
      ```bash
      # Backend
      docker build -t amplifieronlinecr.azurecr.io/my-project-api:latest ./api
      az acr login --name amplifieronlinecr
      docker push amplifieronlinecr.azurecr.io/my-project-api:latest
      
      # Frontend (if container type)
      docker build -t amplifieronlinecr.azurecr.io/my-project-web:latest ./web
      docker push amplifieronlinecr.azurecr.io/my-project-web:latest
      ```
      
      Ask user: "Run these commands in your terminal, then confirm when both images are pushed."
      {% endif %}
      
      Store: images_pushed: true when user confirms (or stack is static-web-app)
    
    update_context:
      images_pushed: "{{ selected_stack == 'static-web-app' or (_approval_message == 'done' or _approval_message == 'pushed') }}"
    
    approval_required: true
    approval_message: "Confirm images are pushed to ACR (or press enter to skip for static-web-app)"

  - name: deploy
    description: Deploy to Amplifier Online with preview
    agent: amplifier-online:deployment-guide
    instruction: |
      STAGE: Deployment (Approval Gate)
      
      Stack: **{{ selected_stack }}**
      
      STEP 1: Dry-run preview
        Run: amplifier-online up --dry-run
        
        Present the output to the user:
        ```
        DRY-RUN PREVIEW
        
        [paste dry-run output showing resources to be created]
        ```
      
      STEP 2: Ask for approval
        "This will create the above resources in Azure. Proceed with actual deployment?"
      
      STEP 3: If approved, run deployment
        Run: amplifier-online up
        
        Show real-time output as deployment progresses.
      
      STEP 4: Extract deployment info
        - Project URL (from deployment output)
        - Container App names (if web-app-aca)
        - Static Web App name (if static-web-app or web-app-awa frontend)
      
      Store: deployed: true, deployment_url: [extracted-url]
    
    update_context:
      deployed: "{{ _approval_message == 'yes' or _approval_message == 'deploy' }}"
      deployment_url: "{{ _last_response | extract_deployment_url }}"
    
    approval_required: true
    approval_message: "Approve deployment after reviewing dry-run preview"

  - name: verify
    description: Health check and troubleshooting
    agent: amplifier-online:deployment-guide
    instruction: |
      STAGE: Verification
      
      Deployment URL: {{ deployment_url }}
      
      STEP 1: Check deployment status
        Run: amplifier-online status
        
        Parse output:
        - Are all containers/apps in "Running" state?
        - Any error messages?
      
      STEP 2: Health check (for container stacks)
        {% if selected_stack != 'static-web-app' %}
        Run: curl {{ deployment_url }}/health
        
        ✅ If 200 OK → "Health check passed"
        ❌ If failed → Engage troubleshooting mode:
          1. amplifier-online logs --container [service-name]
          2. Map error to failure mode in troubleshooting-playbook.md
          3. Guide remediation
        {% else %}
        Run: curl {{ deployment_url }}
        
        ✅ If loads → "Static site is live"
        ❌ If failed → Check Static Web App deployment logs in Azure Portal
        {% endif %}
      
      STEP 3: Present results
        ```
        DEPLOYMENT VERIFICATION
        
        ✅ Status: All containers/apps running
        ✅ Health: {{ deployment_url }}/health → 200 OK
        ✅ Your app is live at: {{ deployment_url }}
        
        Next: Set up CI/CD for automatic deployments? (next stage)
        ```
      
      Store: deployment_healthy: true if all checks pass
    
    update_context:
      deployment_healthy: "{{ _last_response | check_deployment_health }}"

  - name: cicd-setup
    description: Optional GitHub Actions CI/CD setup
    agent: amplifier-online:deployment-guide
    instruction: |
      STAGE: CI/CD Setup (Optional)
      
      Stack: **{{ selected_stack }}**
      
      Ask user: "Want to set up GitHub Actions for automatic deployments on push? (yes/skip)"
      
      IF YES:
        STEP 1: Generate workflows
          Run: amplifier-online cicd create --dry-run
          
          Show preview:
          ```
          WORKFLOWS TO BE CREATED
          
          [list generated workflow files]
          ```
        
        STEP 2: Create workflows if user approves
          Run: amplifier-online cicd create
        
        STEP 3: Guide GitHub secrets setup
          Load @amplifier-online:context/agent/cicd-guide.md
          
          Present required secrets based on stack:
          
          {% if selected_stack == 'web-app-aca' or selected_stack == 'web-app-awa' %}
          For container workflows:
            - AZURE_CLIENT_ID
            - AZURE_TENANT_ID
            - AZURE_SUBSCRIPTION_ID
          
          How to get these values:
          [guide from cicd-guide.md]
          {% endif %}
          
          {% if selected_stack == 'web-app-awa' or selected_stack == 'static-web-app' %}
          For Static Web App:
            - AZURE_STATIC_WEB_APPS_API_TOKEN
          
          How to get: Azure Portal → Static Web App → Manage deployment token
          {% endif %}
        
        STEP 4: Commit workflows
          ```bash
          git add .github/workflows/
          git commit -m "Add CI/CD workflows for {{ selected_stack }}"
          git push
          ```
      
      IF SKIP:
        "No problem. You can set up CI/CD later with: amplifier-online cicd create"
      
      FINAL SUMMARY:
        ```
        🎉 DEPLOYMENT COMPLETE
        
        Project: [name]
        Stack: {{ selected_stack }}
        URL: {{ deployment_url }}
        CI/CD: [Configured | Skipped]
        
        Next steps:
        - Visit {{ deployment_url }} to see your app
        - Monitor with: amplifier-online status
        - View logs with: amplifier-online logs
        {% if cicd configured %}
        - Push to main branch to trigger automatic deployments
        {% endif %}
        ```
    
    approval_required: true
    approval_message: "Set up CI/CD? (yes/skip)"
